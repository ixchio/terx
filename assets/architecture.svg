<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117" />
      <stop offset="100%" stop-color="#161b22" />
    </linearGradient>

    <!-- Node Glow Filters -->
    <filter id="glowGold" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#ffb703" flood-opacity="0.15" />
    </filter>
    <filter id="glowBlue" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#2196f3" flood-opacity="0.15" />
    </filter>
    <filter id="glowGreen" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#4caf50" flood-opacity="0.15" />
    </filter>

    <!-- Border Gradients -->
    <linearGradient id="goldBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffb703" />
      <stop offset="100%" stop-color="#fb8500" />
    </linearGradient>
    <linearGradient id="blueBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2196f3" />
      <stop offset="100%" stop-color="#00bcd4" />
    </linearGradient>
    <linearGradient id="greenBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4caf50" />
      <stop offset="100%" stop-color="#8bc34a" />
    </linearGradient>
  </defs>

  <!-- Canvas Background -->
  <rect width="880" height="400" rx="12" fill="url(#bgGrad)" stroke="#30363d" stroke-width="1.5" />

  <!-- GRID PATTERN -->
  <g opacity="0.05">
    <path d="M 0,40 L 880,40 M 0,80 L 880,80 M 0,120 L 880,120 M 0,160 L 880,160 M 0,200 L 880,200 M 0,240 L 880,240 M 0,280 L 880,280 M 0,320 L 880,320 M 0,360 L 880,360" stroke="#ffffff" stroke-width="1" />
    <path d="M 40,0 L 40,400 M 80,0 L 80,400 M 120,0 L 120,400 M 160,0 L 160,400 M 200,0 L 200,400 M 240,0 L 240,400 M 280,0 L 280,400 M 320,0 L 320,400 M 360,0 L 360,400 M 400,0 L 400,400 M 440,0 L 440,400 M 480,0 L 480,400 M 520,0 L 520,400 M 560,0 L 560,400 M 600,0 L 600,400 M 640,0 L 640,400 M 680,0 L 680,400 M 720,0 L 720,400 M 760,0 L 760,400 M 800,0 L 800,400 M 840,0 L 840,400" stroke="#ffffff" stroke-width="1" />
  </g>

  <!-- TITLE -->
  <text x="30" y="40" fill="#f0f6fc" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" letter-spacing="0.5">TERX ARCHITECTURE &amp; LIFECYCLE</text>

  <!-- COLUMN 1: INPUT/AGENT -->
  <g transform="translate(40, 90)" filter="url(#glowGold)">
    <rect width="200" height="230" rx="10" fill="#161b22" stroke="url(#goldBorder)" stroke-width="1.5" />
    <rect width="200" height="36" rx="10" fill="#21262d" />
    <path d="M 0,36 L 200,36" stroke="#30363d" stroke-width="1" />
    <text x="100" y="23" fill="#ffb703" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" text-anchor="middle">AI Agent Context</text>
    
    <!-- Inner Boxes -->
    <rect x="15" y="55" width="170" height="40" rx="6" fill="#0d1117" stroke="#30363d" />
    <text x="25" y="79" fill="#c9d1d9" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600">Claude / Cursor</text>
    
    <rect x="15" y="110" width="170" height="40" rx="6" fill="#0d1117" stroke="#30363d" />
    <text x="25" y="134" fill="#c9d1d9" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600">FastMCP Tools</text>

    <rect x="15" y="165" width="170" height="45" rx="6" fill="#0d1117" stroke="#30363d" />
    <text x="25" y="184" fill="#c9d1d9" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill-opacity="0.8">TASK INTENT</text>
    <text x="25" y="198" fill="#ffb703" font-family="monospace" font-size="10">"login to salesforce"</text>
  </g>

  <!-- CONNECTOR 1 -->
  <g stroke="#ffb703" stroke-width="1.5" fill="none" opacity="0.8">
    <path d="M 240,205 L 300,205" />
    <polygon points="300,205 292,201 292,209" fill="#ffb703" />
  </g>

  <!-- COLUMN 2: TERX MIDDLEWARE LAYER -->
  <g transform="translate(310, 60)" filter="url(#glowBlue)">
    <rect width="280" height="290" rx="10" fill="#161b22" stroke="url(#blueBorder)" stroke-width="1.5" />
    <rect width="280" height="36" rx="10" fill="#21262d" />
    <path d="M 0,36 L 280,36" stroke="#30363d" stroke-width="1" />
    <text x="140" y="23" fill="#58a6ff" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" text-anchor="middle">TERX Engine (Memory Layer)</text>

    <!-- Sub-components inside TERX -->
    <!-- 1. CDP Bridge & Proxy -->
    <rect x="15" y="55" width="250" height="45" rx="6" fill="#0d1117" stroke="#30363d" />
    <text x="25" y="73" fill="#f0f6fc" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700">CDP Bridge &amp; Proxy</text>
    <text x="25" y="88" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="10">Transparently intercepts &amp; logs commands</text>

    <!-- 2. DOM Extractor -->
    <rect x="15" y="110" width="250" height="45" rx="6" fill="#0d1117" stroke="#30363d" />
    <text x="25" y="128" fill="#f0f6fc" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700">DOM Extractor</text>
    <text x="25" y="143" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="10">Accessibility Tree + Levenshtein Similarity</text>

    <!-- 3. Muscle Memory Cache -->
    <rect x="15" y="165" width="250" height="50" rx="6" fill="#0d1117" stroke="#30363d" />
    <text x="25" y="183" fill="#f0f6fc" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700">Muscle Memory Cache (SQLite)</text>
    <text x="25" y="197" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="9.5">Stores task sequences keyed by DOM hash</text>
    <text x="25" y="208" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="9.5">Outputs Agent VCR-compatible .vcr trails</text>

    <!-- 4. Self-Healer & SSIM -->
    <rect x="15" y="225" width="250" height="50" rx="6" fill="#0d1117" stroke="#30363d" />
    <text x="25" y="243" fill="#f0f6fc" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700">Self-Healer &amp; SSIM Auditing</text>
    <text x="25" y="257" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="9.5">Re-binds parameters on DOM drift (LLM)</text>
    <text x="25" y="268" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="9.5">Computes SSIM visual divergence warnings</text>
  </g>

  <!-- CONNECTOR 2 -->
  <g stroke="#58a6ff" stroke-width="1.5" fill="none" opacity="0.8">
    <path d="M 590,205 L 630,205" />
    <polygon points="630,205 622,201 622,209" fill="#58a6ff" />
  </g>

  <!-- COLUMN 3: BROWSER TARGET -->
  <g transform="translate(640, 90)" filter="url(#glowGreen)">
    <rect width="200" height="230" rx="10" fill="#161b22" stroke="url(#greenBorder)" stroke-width="1.5" />
    <rect width="200" height="36" rx="10" fill="#21262d" />
    <path d="M 0,36 L 200,36" stroke="#30363d" stroke-width="1" />
    <text x="100" y="23" fill="#56d364" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" text-anchor="middle">Chrome Browser</text>

    <rect x="15" y="55" width="170" height="40" rx="6" fill="#0d1117" stroke="#30363d" />
    <text x="25" y="79" fill="#c9d1d9" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600">DevTools Protocol (CDP)</text>

    <!-- Live Page Representation -->
    <rect x="15" y="110" width="170" height="100" rx="6" fill="#0d1117" stroke="#30363d" />
    <text x="25" y="130" fill="#56d364" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700">DOM Rendering</text>
    
    <!-- Render elements -->
    <rect x="25" y="142" width="120" height="12" rx="3" fill="#21262d" stroke="#30363d" />
    <text x="30" y="151" fill="#8b949e" font-family="monospace" font-size="8">input[type="text"]</text>
    
    <rect x="25" y="160" width="120" height="12" rx="3" fill="#21262d" stroke="#30363d" />
    <text x="30" y="169" fill="#8b949e" font-family="monospace" font-size="8">input[type="password"]</text>
    
    <rect x="25" y="180" width="70" height="15" rx="3" fill="#238636" />
    <text x="35" y="191" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="8" font-weight="700">Login Btn</text>
  </g>
</svg>
