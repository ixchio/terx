site_name: TERX
site_description: Memory layer for browser agents — zero LLM tokens on repeated tasks
site_url: https://ixchio.github.io/terx
repo_url: https://github.com/ixchio/terx
repo_name: ixchio/terx

theme:
  name: material
  palette:
    - scheme: slate
      primary: indigo
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: indigo
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Quick Start: quickstart.md
  - Benchmarks: benchmarks.md
  - Architecture: development.md
  - Workflow: workflow.md
  - Changelog: changelog.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - tables
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ixchio/terx
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/terx/
